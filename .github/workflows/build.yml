name: Build & Release GBankPoster

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pillow pystray tkinterdnd2

      - name: Build EXE
        working-directory: GbankPoster
        run: pyinstaller GBankPoster.spec

      - name: Compute SHA-256 checksum
        working-directory: GbankPoster
        shell: pwsh
        run: |
          $hash = (Get-FileHash dist\GBankPoster.exe -Algorithm SHA256).Hash
          Write-Output "SHA256: $hash"
          echo "SHA256=$hash" >> $env:GITHUB_ENV
          $hash | Out-File -FilePath dist\GBankPoster.exe.sha256 -Encoding ascii

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: GBankPoster-${{ github.sha }}
          path: |
            GbankPoster/dist/GBankPoster.exe
            GbankPoster/dist/GBankPoster.exe.sha256
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            GbankPoster/dist/GBankPoster.exe
            GbankPoster/dist/GBankPoster.exe.sha256
          body: |
            ## GBank Poster ${{ github.ref_name }}

            ### Download
            Download **GBankPoster.exe** below and double-click to run. No installation required.

            ### Verify your download (optional but recommended)
            After downloading, open PowerShell and run:
            ```powershell
            Get-FileHash GBankPoster.exe -Algorithm SHA256
            ```
            The hash should match exactly:
            ```
            ${{ env.SHA256 }}
            ```
            If the hashes match, the file is identical to what GitHub built from the source code in this repository.

            ### This build was created automatically
            This EXE was built by GitHub Actions directly from the source code in this repository.
            You can inspect every step in the [Actions tab](../../actions) — no manual intervention, no added files.
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
